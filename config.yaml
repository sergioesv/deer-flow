# Configuración personalizada para DeerFlow en Railway
config_version: 3
log_level: info

# ============================================================================
# Modelos de Inteligencia Artificial (Cerebro)
# ============================================================================
models:
  # Configuramos GPT-4o como el modelo principal
  - name: gpt-4o
    display_name: GPT-4o (Principal)
    use: langchain_openai:ChatOpenAI
    model: gpt-4o
    api_key: $OPENAI_API_KEY  # <--- Esto llama a tu variable de Railway
    max_tokens: 4096
    temperature: 0.7
    supports_vision: true

  # Modelo económico para tareas secundarias (como resúmenes)
  - name: gpt-4o-mini
    display_name: GPT-4o Mini
    use: langchain_openai:ChatOpenAI
    model: gpt-4o-mini
    api_key: $OPENAI_API_KEY
    max_tokens: 4096

# ============================================================================
# Herramientas (Manos del Agente)
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

tools:
  # Buscador principal (Usa Serper o Tavily según lo que tengas)
  - name: web_search
    group: web
    use: deerflow.community.tavily.tools:web_search_tool
    max_results: 5
    api_key: $TAVILY_API_KEY

  # Lector de páginas web (Para que el agente "lea" links)
  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # Herramientas de archivos (Le permiten crear y editar código)
  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool
  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool
  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool
  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# Memoria y Persistencia (¡Vital en Railway!)
# ============================================================================
# Usamos tu base de datos Postgres de Railway para que las conversaciones no se borren
checkpointer:
  type: postgres
  connection_string: $DATABASE_URL # <--- Railway llena esto automáticamente

memory:
  enabled: true
  storage_path: memory.json
  model_name: gpt-4o-mini # Usamos el modelo barato para ahorrar tokens de memoria

# ============================================================================
# Sandbox (Cajón de Arena Seguro)
# ============================================================================
sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
